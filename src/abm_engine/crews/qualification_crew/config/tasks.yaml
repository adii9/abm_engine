account_selection_task:
  description: >
    Evaluate the company {company_name} against our strict Ideal Customer Profile (ICP) criteria. 
    
    You MUST actively search for information about {company_name} using your tools before making a decision. Specifically, prioritize searching LinkedIn and Tracxn.com (e.g., query "{company_name} Tracxn" or "{company_name} LinkedIn company page") to gather firmographic data, employee counts, and recent funding rounds to validate against the ICP.
    
    ICP Criteria:
    {icp_criteria}
    
    CRITICAL INSTRUCTION: You MUST strictly evaluate if the company matches the 'target_industries' and 'company_size'. If the company does not fall into one of the exact target industries (like VC, PE, Family Offices), you MUST reject them by setting `icp_fit` to false, regardless of how large or expanding they are. Do not approve software giants like Google or Apple unless they are explicitly venture capital firms.
  expected_output: >
    A Boolean value indicating whether the company is an ICP fit (`icp_fit`) and a string explaining the reasoning (`reason`).
  agent: account_scout
